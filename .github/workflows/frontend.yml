name: Frontend

on:
  push:
    branches: [main, develop]
    paths:
      - "frontend/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "package.json"
  pull_request:
    branches: [main, develop]
    paths:
      - "frontend/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "package.json"

jobs:
  lint-build:
    name: Lint & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm --filter frontend run lint

      - name: Build
        run: pnpm --filter frontend run build
        env:
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_USER_POOL_ID: ${{ vars.NEXT_PUBLIC_USER_POOL_ID }}
          NEXT_PUBLIC_USER_POOL_CLIENT: ${{ vars.NEXT_PUBLIC_USER_POOL_CLIENT }}
          NEXT_PUBLIC_ENV: ${{ vars.NEXT_PUBLIC_ENV }}

  deploy-amplify-dev:
    name: Trigger Amplify Deploy (Dev)
    runs-on: ubuntu-latest
    needs: lint-build
    environment: dev
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Start Amplify job
        env:
          AMPLIFY_APP_ID: ${{ vars.AMPLIFY_APP_ID_DEV }}
          AMPLIFY_BRANCH: develop
        run: .github/scripts/amplify-start-release.sh

  deploy-amplify-prod:
    name: Trigger Amplify Deploy (Prod)
    runs-on: ubuntu-latest
    needs: lint-build
    environment: prod
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Start Amplify job
        env:
          AMPLIFY_APP_ID: ${{ vars.AMPLIFY_APP_ID_PROD }}
          AMPLIFY_BRANCH: main
        run: .github/scripts/amplify-start-release.sh
