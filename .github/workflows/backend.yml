name: Backend

on:
  push:
    branches: [main, develop]
    paths:
      - "backend/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "package.json"
  pull_request:
    branches: [main, develop]
    paths:
      - "backend/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "package.json"

jobs:
  test:
    name: Type-check & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm --filter chatbot-platform-backend run type-check

      - name: Run tests
        run: pnpm --filter chatbot-platform-backend run test

  deploy-dev:
    name: Deploy to Dev
    runs-on: ubuntu-latest
    needs: test
    environment: dev
    concurrency:
      group: lambda-deploy-dev
      cancel-in-progress: false
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm --filter chatbot-platform-backend run build
        env:
          NODE_ENV: production

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Deploy Lambdas
        working-directory: backend
        run: |
          for fn in webhook process_message tenants bots conversations templates bulk_send process_bulk_send campaigns process_campaign metrics authorizer whatsapp_connect billing support_tickets admin public_api api_keys; do
            FUNCTION_NAME="chatbot-platform-dev-${fn//_/-}"
            echo "Deploying $FUNCTION_NAME..."
            aws lambda update-function-code \
              --function-name "$FUNCTION_NAME" \
              --zip-file fileb://dist/functions.zip \
              --no-cli-pager
            aws lambda wait function-updated --function-name "$FUNCTION_NAME"
          done

  deploy-prod:
    name: Deploy to Prod
    runs-on: ubuntu-latest
    needs: test
    environment: prod
    concurrency:
      group: lambda-deploy-prod
      cancel-in-progress: false
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm --filter chatbot-platform-backend run build
        env:
          NODE_ENV: production

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Deploy Lambdas
        working-directory: backend
        run: |
          for fn in webhook process_message tenants bots conversations templates bulk_send process_bulk_send campaigns process_campaign metrics authorizer whatsapp_connect billing support_tickets admin public_api api_keys; do
            FUNCTION_NAME="chatbot-platform-prod-${fn//_/-}"
            echo "Deploying $FUNCTION_NAME..."
            aws lambda update-function-code \
              --function-name "$FUNCTION_NAME" \
              --zip-file fileb://dist/functions.zip \
              --no-cli-pager
            aws lambda wait function-updated --function-name "$FUNCTION_NAME"
          done
