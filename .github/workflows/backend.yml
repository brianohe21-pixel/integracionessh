name: Backend

on:
  push:
    branches: [main, develop]
    paths:
      - "backend/**"
      - "infrastructure/modules/lambda/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "package.json"
      - ".github/workflows/backend.yml"
      - ".github/scripts/deploy-lambdas.sh"
      - ".github/scripts/validate-lambda-manifest.sh"
      - ".github/scripts/wait-for-terraform.sh"
      - ".github/scripts/changed-files-in-push.sh"
  pull_request:
    branches: [main, develop]
    paths:
      - "backend/**"
      - "infrastructure/modules/lambda/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "package.json"
      - ".github/workflows/backend.yml"
      - ".github/scripts/deploy-lambdas.sh"
      - ".github/scripts/validate-lambda-manifest.sh"
      - ".github/scripts/wait-for-terraform.sh"
      - ".github/scripts/changed-files-in-push.sh"

concurrency:
  group: ${{ github.event_name == 'pull_request' && github.base_ref == 'main' && 'ci-main' || format('{0}-{1}', github.workflow, github.ref) }}
  cancel-in-progress: false

permissions:
  contents: read
  actions: read

jobs:
  test:
    name: Type-check, Test & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm --filter chatbot-platform-backend run type-check

      - name: Run tests
        run: pnpm --filter chatbot-platform-backend run test

      - name: Lint
        run: pnpm --filter chatbot-platform-backend run lint

      - name: Build
        run: pnpm --filter chatbot-platform-backend run build
        env:
          NODE_ENV: production

      - name: Validate Lambda manifest
        run: bash .github/scripts/validate-lambda-manifest.sh

      - name: Upload Lambda package
        if: github.event_name == 'push' && (github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main')
        uses: actions/upload-artifact@v4
        with:
          name: lambda-package
          path: |
            backend/dist/functions.zip
            backend/dist/lambda-manifest.json
          retention-days: 1

  deploy-dev:
    name: Deploy to Dev
    runs-on: ubuntu-latest
    needs: test
    environment: dev
    concurrency:
      group: lambda-code-dev
      cancel-in-progress: false
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Lambda package
        uses: actions/download-artifact@v4
        with:
          name: lambda-package
          path: backend/dist

      - name: Detect lambda infra changes
        id: changes
        run: |
          set -euo pipefail
          files=$(bash .github/scripts/changed-files-in-push.sh "${GITHUB_SHA}" "${{ github.event.before }}")
          if echo "$files" | grep -q '^infrastructure/modules/lambda/'; then
            echo "lambda_infra=true" >> "$GITHUB_OUTPUT"
          else
            echo "lambda_infra=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Wait for Terraform workflow
        if: steps.changes.outputs.lambda_infra == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash .github/scripts/wait-for-terraform.sh "${GITHUB_REF_NAME}" "${GITHUB_SHA}" "${{ github.event.before }}"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Deploy Lambdas
        run: bash .github/scripts/deploy-lambdas.sh dev

  deploy-prod:
    name: Deploy to Prod
    runs-on: ubuntu-latest
    needs: test
    environment: prod
    concurrency:
      group: deploy-main
      cancel-in-progress: false
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Lambda package
        uses: actions/download-artifact@v4
        with:
          name: lambda-package
          path: backend/dist

      - name: Detect lambda infra changes
        id: changes
        run: |
          set -euo pipefail
          files=$(bash .github/scripts/changed-files-in-push.sh "${GITHUB_SHA}" "${{ github.event.before }}")
          if echo "$files" | grep -q '^infrastructure/modules/lambda/'; then
            echo "lambda_infra=true" >> "$GITHUB_OUTPUT"
          else
            echo "lambda_infra=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Wait for Terraform workflow
        if: steps.changes.outputs.lambda_infra == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash .github/scripts/wait-for-terraform.sh "${GITHUB_REF_NAME}" "${GITHUB_SHA}" "${{ github.event.before }}"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Deploy Lambdas
        run: bash .github/scripts/deploy-lambdas.sh prod
