name: Terraform

on:
  workflow_dispatch:
  push:
    branches: [main, develop]
    paths:
      - "infrastructure/**"
      - ".github/workflows/terraform.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "infrastructure/**"
      - ".github/workflows/terraform.yml"

permissions:
  contents: read
  pull-requests: write

jobs:
  terraform-dev:
    name: Terraform Dev
    runs-on: ubuntu-latest
    environment: dev
    defaults:
      run:
        working-directory: infrastructure/environments/dev

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          HUSKY: "0"

      - name: Build Lambda package
        run: pnpm --filter chatbot-platform-backend run build
        env:
          NODE_ENV: production

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.11.4"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Terraform fmt
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Require Terraform secrets and variables
        env:
          GH_ACCESS_TOKEN: ${{ secrets.GH_ACCESS_TOKEN }}
          WHATSAPP_VERIFY_TOKEN: ${{ secrets.WHATSAPP_VERIFY_TOKEN }}
          REPOSITORY_URL: ${{ vars.REPOSITORY_URL }}
        run: |
          set -euo pipefail
          if [ -z "${GH_ACCESS_TOKEN}" ]; then
            echo "::error::GH_ACCESS_TOKEN is missing or empty. Add it under Settings → Environments → dev → Secrets (classic PAT or fine-grained token with repo access for Amplify)."
            exit 1
          fi
          if [ -z "${WHATSAPP_VERIFY_TOKEN}" ]; then
            echo "::error::WHATSAPP_VERIFY_TOKEN is missing or empty. Add it under Settings → Environments → dev → Secrets."
            exit 1
          fi
          if [ -z "${REPOSITORY_URL}" ]; then
            echo "::error::REPOSITORY_URL is missing or empty. Add it under Settings → Secrets and variables → Actions → Variables (e.g. https://github.com/org/repo)."
            exit 1
          fi

      - name: Remove monitoring from state when disabled
        run: |
          set -euo pipefail
          if [ "${ENABLE_MONITORING:-false}" != "true" ]; then
            for addr in $(terraform state list 2>/dev/null | grep '^module\.monitoring' || true); do
              echo "Removing $addr from state (enable_monitoring=false)"
              terraform state rm "$addr"
            done
          fi
        env:
          ENABLE_MONITORING: ${{ vars.ENABLE_MONITORING }}

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan \
            -var="github_access_token=${{ secrets.GH_ACCESS_TOKEN }}" \
            -var="whatsapp_verify_token=${{ secrets.WHATSAPP_VERIFY_TOKEN }}" \
            -var="repository_url=${{ vars.REPOSITORY_URL }}" \
            -out=tfplan \
            -no-color
        continue-on-error: true

      - name: Comment PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const output = `#### Terraform Plan (dev) \`${{ steps.plan.outcome }}\`
            <details><summary>Show Plan</summary>

            \`\`\`\n${{ steps.plan.outputs.stdout }}\`\`\`

            </details>`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })

      - name: Terraform Apply
        if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
        run: terraform apply -auto-approve tfplan

  terraform-prod:
    name: Terraform Prod
    runs-on: ubuntu-latest
    environment: prod
    if: github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: infrastructure/environments/prod

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          HUSKY: "0"

      - name: Build Lambda package
        run: pnpm --filter chatbot-platform-backend run build
        env:
          NODE_ENV: production

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.11.4"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Terraform Init
        run: terraform init

      - name: Require Terraform secrets and variables
        env:
          GH_ACCESS_TOKEN: ${{ secrets.GH_ACCESS_TOKEN }}
          WHATSAPP_VERIFY_TOKEN: ${{ secrets.WHATSAPP_VERIFY_TOKEN }}
          REPOSITORY_URL: ${{ vars.REPOSITORY_URL }}
        run: |
          set -euo pipefail
          if [ -z "${GH_ACCESS_TOKEN}" ]; then
            echo "::error::GH_ACCESS_TOKEN is missing or empty. Add it under Settings → Environments → prod → Secrets."
            exit 1
          fi
          if [ -z "${WHATSAPP_VERIFY_TOKEN}" ]; then
            echo "::error::WHATSAPP_VERIFY_TOKEN is missing or empty. Add it under Settings → Environments → prod → Secrets."
            exit 1
          fi
          if [ -z "${REPOSITORY_URL}" ]; then
            echo "::error::REPOSITORY_URL is missing or empty. Add it under Settings → Secrets and variables → Actions → Variables."
            exit 1
          fi

      - name: Terraform Plan
        run: |
          terraform plan \
            -var="github_access_token=${{ secrets.GH_ACCESS_TOKEN }}" \
            -var="whatsapp_verify_token=${{ secrets.WHATSAPP_VERIFY_TOKEN }}" \
            -var="repository_url=${{ vars.REPOSITORY_URL }}" \
            -var="custom_domain=${{ vars.CUSTOM_DOMAIN }}" \
            -out=tfplan \
            -no-color

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan
