            set -e
            if [ "$plan_status" -eq 0 ]; then
              break
            fi
            if grep -Eqi 'Error acquiring the state lock|PreconditionFailed|lock' plan.txt; then
              echo "::warning::Terraform plan hit a transient state lock (attempt $attempt/3); retrying in 15s"
              if [ "$attempt" -lt 3 ]; then
                sleep 15
                continue
              fi
            fi
            exit "$plan_status"
          done

      - name: Terraform Apply
        if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && steps.plan.outcome == 'success'
        run: |
          set -euo pipefail
          test -f tfplan
          for attempt in 1 2 3; do
            set +e
            terraform apply -auto-approve -parallelism=1 -lock-timeout=10m tfplan 2>&1 | tee apply.txt
