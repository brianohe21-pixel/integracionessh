name: Terraform

on:
  workflow_dispatch:
  push:
    branches: [main, develop]
    paths:
      - "infrastructure/**"
      - ".github/workflows/terraform.yml"
      - ".github/scripts/terraform-plan-apply.sh"
      - ".github/scripts/terraform-unlock-stale.sh"
  pull_request:
    branches: [main, develop]
    paths:
      - "infrastructure/**"
      - ".github/workflows/terraform.yml"
      - ".github/scripts/terraform-plan-apply.sh"
      - ".github/scripts/terraform-unlock-stale.sh"

permissions:
  contents: read
  pull-requests: write

jobs:
  terraform-dev:
    name: Terraform Dev
    runs-on: ubuntu-latest
    environment: dev
    if: github.ref == 'refs/heads/develop' || github.event_name == 'pull_request'
    concurrency:
      group: terraform-dev
      cancel-in-progress: false
    defaults:
      run:
        working-directory: infrastructure/environments/dev

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.11.4"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Terraform fmt
        run: terraform fmt -check -recursive

      - name: Terraform Init
        run: terraform init -reconfigure -input=false

      - name: Terraform Validate
        run: terraform validate

      - name: Require Terraform secrets and variables
        env:
          GH_ACCESS_TOKEN: ${{ secrets.GH_ACCESS_TOKEN }}
          WHATSAPP_VERIFY_TOKEN: ${{ secrets.WHATSAPP_VERIFY_TOKEN }}
          REPOSITORY_URL: ${{ vars.REPOSITORY_URL }}
        run: |
          set -euo pipefail
          if [ -z "${GH_ACCESS_TOKEN}" ]; then
            echo "::error::GH_ACCESS_TOKEN is missing or empty. Add it under Settings → Environments → dev → Secrets (classic PAT or fine-grained token with repo access for Amplify)."
            exit 1
          fi
          if [ -z "${WHATSAPP_VERIFY_TOKEN}" ]; then
            echo "::error::WHATSAPP_VERIFY_TOKEN is missing or empty. Add it under Settings → Environments → dev → Secrets."
            exit 1
          fi
          if [ -z "${REPOSITORY_URL}" ]; then
            echo "::error::REPOSITORY_URL is missing or empty. Add it under Settings → Secrets and variables → Actions → Variables (e.g. https://github.com/org/repo)."
            exit 1
          fi

      - name: Clear stale Terraform state lock
        env:
          TF_STATE_KEY: dev/terraform.tfstate
        run: bash ../../../.github/scripts/terraform-unlock-stale.sh

      - name: Terraform Plan
        id: plan
        env:
          GH_ACCESS_TOKEN: ${{ secrets.GH_ACCESS_TOKEN }}
          WHATSAPP_VERIFY_TOKEN: ${{ secrets.WHATSAPP_VERIFY_TOKEN }}
          REPOSITORY_URL: ${{ vars.REPOSITORY_URL }}
          META_APP_ID: ${{ vars.META_APP_ID }}
          META_APP_SECRET: ${{ secrets.META_APP_SECRET }}
          META_EMBEDDED_SIGNUP_CONFIG_ID: ${{ vars.META_EMBEDDED_SIGNUP_CONFIG_ID }}
          FRONTEND_URL: ${{ vars.FRONTEND_URL }}
          API_CUSTOM_DOMAIN: ${{ vars.API_CUSTOM_DOMAIN }}
          WOMPI_PUBLIC_KEY: ${{ vars.WOMPI_PUBLIC_KEY }}
          WOMPI_PRIVATE_KEY: ${{ secrets.WOMPI_PRIVATE_KEY }}
          WOMPI_INTEGRITY_SECRET: ${{ secrets.WOMPI_INTEGRITY_SECRET }}
          WOMPI_EVENTS_SECRET: ${{ secrets.WOMPI_EVENTS_SECRET }}
          EXTRA_ALLOWED_ORIGINS: ${{ vars.EXTRA_ALLOWED_ORIGINS }}
          EXTRA_CALLBACK_URLS: ${{ vars.EXTRA_CALLBACK_URLS }}
          EXTRA_LOGOUT_URLS: ${{ vars.EXTRA_LOGOUT_URLS }}
          ENABLE_MONITORING: ${{ vars.ENABLE_MONITORING }}
          OPS_ALERT_EMAIL: ${{ vars.OPS_ALERT_EMAIL }}
          SES_FROM_EMAIL: ${{ vars.SES_FROM_EMAIL }}
          TF_PLAN_OUT: ${{ github.event_name == 'push' && github.ref == 'refs/heads/develop' && 'true' || 'false' }}
        run: bash ../../../.github/scripts/terraform-plan-apply.sh plan

      - name: Upload plan artifact
        if: always() && hashFiles('infrastructure/environments/dev/plan.txt') != ''
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-dev-${{ github.run_id }}
          path: infrastructure/environments/dev/plan.txt
          retention-days: 7

      - name: Comment PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const planPath = 'infrastructure/environments/dev/plan.txt';
            let plan = '';
            try {
              plan = fs.readFileSync(planPath, 'utf8');
            } catch {
              plan = 'Plan output not available.';
            }
            const truncated = plan.length > 60000 ? plan.slice(0, 60000) + '\n...(truncated)' : plan;
            const marker = '<!-- terraform-plan-dev -->';
            const output = `${marker}
            #### Terraform Plan (dev) \`${{ steps.plan.outcome }}\`
            <details><summary>Show Plan</summary>

            \`\`\`\n${truncated}\`\`\`

            </details>`;

            const { data: comments } = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            const existing = comments.find((c) =>
              c.user.type === 'Bot' && c.body && c.body.includes(marker)
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: output,
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: output,
              });
            }

      - name: Terraform Apply
        if: github.ref == 'refs/heads/develop' && github.event_name == 'push' && steps.plan.outcome == 'success'
        env:
          GH_ACCESS_TOKEN: ${{ secrets.GH_ACCESS_TOKEN }}
          WHATSAPP_VERIFY_TOKEN: ${{ secrets.WHATSAPP_VERIFY_TOKEN }}
          REPOSITORY_URL: ${{ vars.REPOSITORY_URL }}
        run: bash ../../../.github/scripts/terraform-plan-apply.sh apply

      - name: Upload apply artifact
        if: always() && hashFiles('infrastructure/environments/dev/apply.txt') != ''
        uses: actions/upload-artifact@v4
        with:
          name: terraform-apply-dev-${{ github.run_id }}
          path: infrastructure/environments/dev/apply.txt
          retention-days: 7

  terraform-prod:
    name: Terraform Prod
    runs-on: ubuntu-latest
    environment: prod
    concurrency:
      group: terraform-prod
      cancel-in-progress: false
    if: github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: infrastructure/environments/prod

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.11.4"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Terraform fmt
        run: terraform fmt -check -recursive

      - name: Terraform Init
        run: terraform init -reconfigure -input=false

      - name: Terraform Validate
        run: terraform validate

      - name: Require Terraform secrets and variables
        env:
          GH_ACCESS_TOKEN: ${{ secrets.GH_ACCESS_TOKEN }}
          WHATSAPP_VERIFY_TOKEN: ${{ secrets.WHATSAPP_VERIFY_TOKEN }}
          REPOSITORY_URL: ${{ vars.REPOSITORY_URL }}
        run: |
          set -euo pipefail
          if [ -z "${GH_ACCESS_TOKEN}" ]; then
            echo "::error::GH_ACCESS_TOKEN is missing or empty. Add it under Settings → Environments → prod → Secrets."
            exit 1
          fi
          if [ -z "${WHATSAPP_VERIFY_TOKEN}" ]; then
            echo "::error::WHATSAPP_VERIFY_TOKEN is missing or empty. Add it under Settings → Environments → prod → Secrets."
            exit 1
          fi
          if [ -z "${REPOSITORY_URL}" ]; then
            echo "::error::REPOSITORY_URL is missing or empty. Add it under Settings → Secrets and variables → Actions → Variables."
            exit 1
          fi

      - name: Clear stale Terraform state lock
        env:
          TF_STATE_KEY: prod/terraform.tfstate
        run: bash ../../../.github/scripts/terraform-unlock-stale.sh

      - name: Terraform Plan
        id: plan
        env:
          GH_ACCESS_TOKEN: ${{ secrets.GH_ACCESS_TOKEN }}
          WHATSAPP_VERIFY_TOKEN: ${{ secrets.WHATSAPP_VERIFY_TOKEN }}
          REPOSITORY_URL: ${{ vars.REPOSITORY_URL }}
          META_APP_ID: ${{ vars.META_APP_ID }}
          META_APP_SECRET: ${{ secrets.META_APP_SECRET }}
          META_EMBEDDED_SIGNUP_CONFIG_ID: ${{ vars.META_EMBEDDED_SIGNUP_CONFIG_ID }}
          FRONTEND_URL: ${{ vars.FRONTEND_URL }}
          CUSTOM_DOMAIN: ${{ vars.CUSTOM_DOMAIN }}
          API_CUSTOM_DOMAIN: ${{ vars.API_CUSTOM_DOMAIN }}
          WOMPI_PUBLIC_KEY: ${{ vars.WOMPI_PUBLIC_KEY }}
          WOMPI_PRIVATE_KEY: ${{ secrets.WOMPI_PRIVATE_KEY }}
          WOMPI_INTEGRITY_SECRET: ${{ secrets.WOMPI_INTEGRITY_SECRET }}
          WOMPI_EVENTS_SECRET: ${{ secrets.WOMPI_EVENTS_SECRET }}
          EXTRA_ALLOWED_ORIGINS: ${{ vars.EXTRA_ALLOWED_ORIGINS }}
          EXTRA_CALLBACK_URLS: ${{ vars.EXTRA_CALLBACK_URLS }}
          EXTRA_LOGOUT_URLS: ${{ vars.EXTRA_LOGOUT_URLS }}
          ENABLE_MONITORING: ${{ vars.ENABLE_MONITORING }}
          OPS_ALERT_EMAIL: ${{ vars.OPS_ALERT_EMAIL }}
          SES_FROM_EMAIL: ${{ vars.SES_FROM_EMAIL }}
          TF_PLAN_OUT: ${{ (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && 'true' || 'false' }}
        run: bash ../../../.github/scripts/terraform-plan-apply.sh plan

      - name: Upload plan artifact
        if: always() && hashFiles('infrastructure/environments/prod/plan.txt') != ''
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-prod-${{ github.run_id }}
          path: infrastructure/environments/prod/plan.txt
          retention-days: 7

      - name: Terraform Apply
        if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && steps.plan.outcome == 'success'
        env:
          GH_ACCESS_TOKEN: ${{ secrets.GH_ACCESS_TOKEN }}
          WHATSAPP_VERIFY_TOKEN: ${{ secrets.WHATSAPP_VERIFY_TOKEN }}
          REPOSITORY_URL: ${{ vars.REPOSITORY_URL }}
        run: bash ../../../.github/scripts/terraform-plan-apply.sh apply

      - name: Upload apply artifact
        if: always() && hashFiles('infrastructure/environments/prod/apply.txt') != ''
        uses: actions/upload-artifact@v4
        with:
          name: terraform-apply-prod-${{ github.run_id }}
          path: infrastructure/environments/prod/apply.txt
          retention-days: 7
